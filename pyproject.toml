[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data",
    "output",
    "input_docs",
    "docs/archive",
    "input_layer_test_*",
]

[tool.ruff.lint]
# Minimum viable gate: catch syntax-level failures and undefined names without
# turning the existing prototype into a style-cleanup project.
select = ["E9", "F63", "F7", "F82"]
